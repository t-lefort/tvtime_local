# Portainer stack for TV Time local
#
# Portainer → Stacks → Add stack → Web editor: paste this file.
# Set the environment variables in Portainer's "Environment
# variables" section: TMDB_API_KEY, AUTH_PASSWORD, ORIGIN.
#
# ORIGIN = the exact URL used to access the app
# (e.g. http://192.168.1.10:3000 or https://tvtime.mydomain.com).
# Without it, actions (checking off an episode…) are rejected (CSRF protection).
#
# If the ghcr.io package is private: Portainer → Registries → Add registry
# (ghcr.io + a GitHub Personal Access Token with the read:packages scope).

services:
  tvtime:
    image: ghcr.io/t-lefort/tvtime_local:latest
    container_name: tvtimelocal
    ports:
      - '3000:3000'
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - ORIGIN=${ORIGIN}
      - TZ=Europe/Paris
    volumes:
      - tvtime_data:/app/data
    restart: unless-stopped

volumes:
  tvtime_data:
