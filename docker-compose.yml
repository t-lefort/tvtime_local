services:
  tvtime:
    build: .
    container_name: tvtimelocal
    ports:
      - '3000:3000'
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      # URL exacte d'accès à l'app (requis pour valider les formulaires hors localhost)
      - ORIGIN=${ORIGIN:-http://localhost:3000}
      - TZ=Europe/Paris
    volumes:
      - ./data:/app/data
      # Décommenter pour lancer l'import GDPR depuis le container :
      # - C:\Users\lefor\Desktop\gdpr-data:/gdpr:ro
    restart: unless-stopped
