services:
  tvtime:
    build: .
    container_name: tvtimelocal
    ports:
      - '3000:3000'
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      # Exact URL used to access the app (required for form submissions outside localhost)
      - ORIGIN=${ORIGIN:-http://localhost:3000}
      - TZ=Europe/Paris
    volumes:
      - ./data:/app/data
      # Uncomment to run the GDPR import from inside the container:
      # - C:\Users\lefor\Desktop\gdpr-data:/gdpr:ro
    restart: unless-stopped
